<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperliquid Spot ↔ Perp Transfer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'SF Mono','Fira Code',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:480px;width:90%;padding:32px}
h1{font-size:20px;color:#00ffa3;margin-bottom:8px}
.subtitle{color:#666;font-size:13px;margin-bottom:24px}
label{display:block;color:#888;font-size:12px;margin-bottom:6px;margin-top:16px}
input,select{width:100%;background:#111118;border:1px solid #333;border-radius:6px;padding:12px;color:#fff;font-family:inherit;font-size:14px}
input:focus,select:focus{outline:none;border-color:#00ffa3}
.direction{display:flex;gap:8px;margin-top:16px}
.dir-btn{flex:1;padding:12px;border-radius:6px;border:1px solid #333;background:#111118;color:#888;cursor:pointer;text-align:center;font-size:13px;transition:all .2s}
.dir-btn.active{border-color:#00ffa3;color:#00ffa3;background:#0a1a12}
button.main{background:#00ffa3;color:#000;border:none;padding:14px 24px;border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:24px;transition:opacity .2s}
button.main:hover{opacity:.9}
button.main:disabled{background:#333;color:#666;cursor:not-allowed}
.result{background:#0d1117;border:1px solid #00ffa3;border-radius:8px;padding:16px;margin-top:20px;font-size:13px;display:none}
.result.ok{border-color:#00ffa3;color:#00ffa3}
.result.err{border-color:#ff4444;color:#ff4444}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #000;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.addr{color:#00ffa3;font-size:12px;margin-top:8px}
.bal{color:#666;font-size:12px;margin-top:4px}
.brand{color:#a855f7;font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.footer{text-align:center;color:#444;font-size:11px;margin-top:32px;padding-top:16px;border-top:1px solid #1a1a2e}
.brand-text{color:#a855f7;font-weight:700}
</style>
</head>
<body>
<div class="container">
  <div class="brand">⚡ Antalpha AI</div>
  <h1>Spot ↔ Perp Transfer</h1>
  <p class="subtitle">Transfer USDC between your Spot and Perp accounts on Hyperliquid.</p>

  <div id="walletSection">
    <button class="main" id="connectBtn" onclick="connect()">Connect Wallet</button>
    <div class="addr" id="walletAddr" style="display:none"></div>
    <div class="bal" id="balInfo" style="display:none"></div>
  </div>

  <div id="formSection" style="display:none">
    <div class="direction">
      <div class="dir-btn active" id="toPerp" onclick="setDir(true)">Spot → Perp</div>
      <div class="dir-btn" id="toSpot" onclick="setDir(false)">Perp → Spot</div>
    </div>

    <label>Amount (USDC)</label>
    <input type="number" id="amount" placeholder="5.0" step="0.1" min="0.1" value="5">

    <button class="main" id="txBtn" onclick="doTransfer()">Transfer</button>
  </div>

  <div class="result" id="resultBox"></div>

  <div class="footer">Powered by <span class="brand-text">Antalpha AI</span> · Zero Custody Trading</div>
</div>

<script>
const HL_API = 'https://api.hyperliquid.xyz';
let userAddr = null;
let toPerp = true;

function setDir(v) {
  toPerp = v;
  document.getElementById('toPerp').className = 'dir-btn' + (v ? ' active' : '');
  document.getElementById('toSpot').className = 'dir-btn' + (v ? '' : ' active');
}

function showResult(msg, ok) {
  const el = document.getElementById('resultBox');
  el.textContent = msg;
  el.className = 'result ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}

async function connect() {
  if (!window.ethereum) { alert('MetaMask not found'); return; }
  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connecting...';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddr = accounts[0].toLowerCase();
    document.getElementById('walletAddr').textContent = '✓ ' + userAddr;
    document.getElementById('walletAddr').style.display = 'block';

    // Fetch balances
    const [perpResp, spotResp] = await Promise.all([
      fetch(HL_API + '/info', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ type: 'clearinghouseState', user: userAddr }) }),
      fetch(HL_API + '/info', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ type: 'spotClearinghouseState', user: userAddr }) })
    ]);
    const perp = await perpResp.json();
    const spot = await spotResp.json();
    const perpBal = parseFloat(perp?.withdrawable || '0');
    const spotBal = spot?.balances?.find(b => b.coin === 'USDC');
    const spotAmt = parseFloat(spotBal?.total || '0');
    document.getElementById('balInfo').textContent = `Spot: $${spotAmt.toFixed(2)} | Perp: $${perpBal.toFixed(2)}`;
    document.getElementById('balInfo').style.display = 'block';

    btn.style.display = 'none';
    document.getElementById('formSection').style.display = 'block';
  } catch(e) {
    btn.innerHTML = 'Connect Wallet';
    btn.disabled = false;
    alert(e.message);
  }
}

async function doTransfer() {
  const btn = document.getElementById('txBtn');
  const amount = document.getElementById('amount').value;
  if (!amount || parseFloat(amount) <= 0) { alert('Enter a valid amount'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sign & Submit...';
  document.getElementById('resultBox').style.display = 'none';

  try {
    const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
    const chainId = parseInt(chainIdHex, 16);
    const signatureChainIdHex = '0x' + chainId.toString(16);
    const nonce = Date.now();

    const message = {
      hyperliquidChain: 'Mainnet',
      amount: amount,
      toPerp: toPerp,
      nonce: nonce
    };

    const domain = {
      name: 'HyperliquidSignTransaction',
      version: '1',
      chainId: chainId,
      verifyingContract: '0x0000000000000000000000000000000000000000'
    };

    const msgParams = JSON.stringify({
      domain: domain,
      types: {
        EIP712Domain: [
          { name: 'name', type: 'string' },
          { name: 'version', type: 'string' },
          { name: 'chainId', type: 'uint256' },
          { name: 'verifyingContract', type: 'address' }
        ],
        'HyperliquidTransaction:UsdClassTransfer': [
          { name: 'hyperliquidChain', type: 'string' },
          { name: 'amount', type: 'string' },
          { name: 'toPerp', type: 'bool' },
          { name: 'nonce', type: 'uint64' }
        ]
      },
      primaryType: 'HyperliquidTransaction:UsdClassTransfer',
      message: message
    });

    const sig = await window.ethereum.request({
      method: 'eth_signTypedData_v4',
      params: [userAddr, msgParams]
    });

    const r = '0x' + sig.slice(2, 66);
    const s = '0x' + sig.slice(66, 130);
    const v = parseInt(sig.slice(130, 132), 16);

    const action = {
      type: 'usdClassTransfer',
      hyperliquidChain: 'Mainnet',
      signatureChainId: signatureChainIdHex,
      amount: amount,
      toPerp: toPerp,
      nonce: nonce
    };

    const resp = await fetch(HL_API + '/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, nonce, signature: { r, s, v } })
    });

    const result = await resp.json();
    if (result.status === 'ok') {
      const dir = toPerp ? 'Spot → Perp' : 'Perp → Spot';
      showResult(`✅ Transferred $${amount} USDC (${dir})`, true);
    } else {
      showResult('❌ ' + JSON.stringify(result), false);
    }
  } catch(e) {
    showResult('❌ ' + e.message, false);
  }

  btn.innerHTML = 'Transfer';
  btn.disabled = false;
}
</script>
</body>
</html>
