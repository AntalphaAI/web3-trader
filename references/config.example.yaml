# Web3 Trader Configuration
# Copy to ~/.web3-trader/config.yaml and fill in your API key

# API Keys (required)
api_keys:
  zeroex: "YOUR_0X_API_KEY"  # Get from https://0x.org/dashboard

# Chain Configuration
chains:
  default: ethereum
  # Supported: ethereum (mainnet)
  # P1 will add: arbitrum, optimism, base

# Risk Management
risk:
  max_slippage: 0.5        # Maximum slippage percentage (0.5 = 0.5%)
  max_amount_usdt: 10000   # Maximum single trade amount in USDT
  
# Gas Configuration
gas:
  strategy: standard       # fast | standard | slow
  # fast: priorityFee = 2x average
  # standard: priorityFee = 1x average  
  # slow: priorityFee = 0.5x average (may be delayed)

# Hyperliquid Config
hyperliquid:
  # Risk control thresholds (also editable via: hl_cli.py risk-config)
  risk:
    enabled: true
    auto_execute_small: true
    thresholds:
      small_max_usd: 100       # < $100: auto-execute, notify after
      medium_max_usd: 1000     # $100-$1000: single confirmation
      high_leverage_x: 10      # >= 10x: double confirmation
      # >= $1000: double confirmation

# Logging
logging:
  enabled: true
  path: ~/.web3-trader/tx_log.jsonl
